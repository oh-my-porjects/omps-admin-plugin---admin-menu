# 模块声明契约（稳定事实源）
# 只放需要进入 Git 评审的模块事实；派生索引由 admin-server 写入工作区 .gitNexus/module-indexes/。
title: "菜单元数据"
summary: "管理后台菜单与模块后台规格存储公共模块，负责保存、查询、删除模块后台 spec，并聚合左侧菜单。"

tables:
  owner_tables:
    - "admin_menu_specs"

lifecycle:
  state_strategy: externalized
  shutdown_requirements:
    - "后台 worker 必须监听 LifecycleCtx/IsUnloading，在模块卸载或重载时停止接收新任务并协作退出。"
  reload_risks: []

background_tasks:
  exit_policy: cooperative_cancel

realtime:
  user_ws_events: []
  admin_events: []
